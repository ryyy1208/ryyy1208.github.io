name: Build and Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: quartz/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: quartz

      - name: Copy content
        run: |
          cp -r 10_Cyber 20_Dev 30_Sys 60_BioAI quartz/content/
          cp README.md quartz/content/index.md

      - name: Build Quartz
        run: npx quartz build
        working-directory: quartz

      - uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
